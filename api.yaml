components:
  schemas:
    AvgAmountDto:
      type: object
      required:
        - avgAmount
      properties:
        avgAmount:
          type: number
          format: double
          description: Average amount of the transaction
    ClientSummaryDto:
      type: object
      required:
        - clientId
      properties:
        total:
          type: number
          format: double
          description: The total USD amount.
        transactionCount:
          type: integer
          format: int64
          description: The number of transactions.
        averageTransaction:
          type: number
          format: double
          description: The average value of transactions.
        client_id: # NOTE: inconsistent naming!
          type: integer
          format: int32
          description: The client ID to which this data pertains.
      description: A DTO for summarising client statistics.
    MaximumAmountDto:
      type: object
      properties:
        maxAmount:
          type: number
          format: double
          description: The maximum USD amount of a transaction.
        timestamp:
          type: string
          format: date-time
          description: The timestamp for the transaction.
        location:
          type: string
          description: The city of the retailer, or "ONLINE".
      description: A DTO for the maximum amount of a transaction.
    MerchantPostDto:
      type: object
      required:
        - merchantCity
      properties:
        merchantCity:
          type: string
          description: The city where the merchant is based, or "ONLINE"
        merchantState:
          type: string
          description: The state where the merchant is located, in capital letter state-code.
      description: A DTO for creating a merchant
    MerchantSummaryDto:
      type: object
      required:
        - merchant_id
      properties:
        merchant_id: # NOTE: Inconsistent naming
          type: integer
          format: int32
          description: The internal ID of the merchant.
        city:
          type: string
          description: The city where the merchant is based, or "ONLINE".
        state:
          type: string
          description: The state where the merchant is located, in capital letter state-code.
        total:
          type: number
          format: double
          description: The total for transactions of this merchant.
        transactions:
          type: integer
          format: int64
          description: The number of transactions for this merchant.
      description: A DTO for summarising a merchant's activity.
    StateSummaryDto:
      type: object
      required:
        - merchantState
      properties:
        merchantState:
          type: string
          description: The US state to which this summary pertains.
        total:
          type: number
          format: double
          description: The total amount in USD of transactions for this state.
      description: A DTO for the sums all transactions for a certain US state.
    TotalAmountDto:
      type: object
      required:
        - day
      properties:
        day:
          type: string
          format: date-time
          description: The day of the transaction.
        totalAmount:
          type: number
          format: double
          description: The total amount for this day
      description: A DTO for the total amount in USD in transactions for a given day.
    TransactionDto:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int32
          description: Unique id of the transaction.
        merchantId:
          type: integer
          format: int32
          description: The ID of the merchant this transaction belongs to.
        date:
          type: string
          format: date-time
          description: The date and time when this transaction occurred.
        amount:
          type: number
          format: double
          description: The value of the transaction in USD.
        clientId:
          type: integer
          format: int32
          description: The ID of the client this transaction belongs to.
      description: A DTO for all transaction data.
    TransactionWriteDto:
      type: object
      properties:
        merchantId:
          type: number
          format: int32
          description: The ID of the merchant this transaction belongs to.
        date:
          type: string
          format: date-time
          description: The date and time when this transaction occurred.
        amount:
          type: number
          format: double
          description: The value of the transaction in USD.
        clientId:
          type: integer
          format: int32
          description: The ID of the client this transaction belongs to.
      description: A DTO for writing new transaction data.
    YearSummaryDto:
      type: object
      required:
        - period
      properties:
        average:
          type: number
          format: double
          description: The average of transactions.
        count:
          type: integer
          format: int64
          description: How many transactions there was.
        period:
          type: string
          format: date-time
          description: The period to which this data pertains.
        total:
          type: number
          format: double
          description: the total of all transactions.
      description: A DTO for the year's summary.

    Merchant:
      type: object
      required:
        - id
        - merchantCity
      properties:
        id:
          type: integer
          format: int32
          description: The internal ID of the merchant.
        merchantCity:
          type: string
          description: The city from which this merchant is registered. "ONLINE" if the merchant is based online.
        merchantState:
          type: string
          description: The state the merchant is based in. Formatted in two-letter state abbreviations with capital letters.
        externalId:
          type: integer
          format: int32
          description: CSV file's key for the merchant.
      description: Model for the merchant data.
    Transaction:
      type: object
      required:
        - id
        - merchant
      properties:
        id:
          type: integer
          format: int32
          description: The unique identifier for the transaction.
        merchant:
          $ref: '#/components/schemas/Merchant'
        date:
          type: string
          format: date-time
          description: The date of the transaction.
        amount:
          type: number
          format: double
          description: Amount in USD for the transaction.
        client_id: # NOTE: Inconsistent naming
          type: integer
          format: int32
          description: ID of the client for the transaction
      description: Model for a transaction.

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string