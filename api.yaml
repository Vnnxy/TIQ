          description: year to filter for.
        - name: month
          in: query
          required: false
          schema:
            type: integer
            format: int32
            maximum: 12
            minimum: 1
          description: month to filter for.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
