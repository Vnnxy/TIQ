  /transactions/total:
    description: Gets the total amount for transactions matching filters.
    get:
      tags:
        - transaction-controller
      operationId: getTotalAmount
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State to filter for.
        - name: month
          in: query
          required: true
          schema:
            type: integer
            format: int32
            maximum: 12
            minimum: 1
          description: Month to filter for.
        - name: batchSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: How many transaction entries to count.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Together with batchSize for paging.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TotalAmountDto"
        "204":
          description: No Content
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "State, month, and batch size are required parameters"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
  /transactions/tb:
    description: Returns the top or bottom of the list
    get:
      tags:
        - transaction-controller
      operationId: getMaxAmount
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: startYear
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: Start year to search from (inclusive).
        - name: endYear
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: End year to search to (inclusive).
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: Number of entries to get.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Number of elements to skip.
        - name: dir
          in: query
          required: true
          schema:
            type: string
          description: TOP or BOTTOM to decide the order of the transactions.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      responses:
        "200":
          description: OK
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaximumAmountDto"
            text/csv:
              schema:
                type: string
              example: |
                maxAmount,timestamp,location
        "204":
          description: No Content
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "Please provide a valid ordering param [top | bottom"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
