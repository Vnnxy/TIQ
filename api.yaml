openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /merchants:
    get:
      description: Retrieves all merchants with limits and pages
      tags:
        - merchant-controller
      operationId: getMerchants
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          description: Number of merchants to return.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Zero-based page operation, combined with "limit" to control pagination.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Merchant'
            text/csv:
              schema:
                type: string
              example: |
                merchant_id,merchant_city,merchant_state
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path

    post:
      description: "Posts a merchant to the database"
      tags:
        - merchant-controller
      operationId: postMerchant
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantPostDto"
          text/csv:
            schema:
              type: string
            example: |
              merchant_id,merchant_city,merchant_state
        required: true
      responses:
        "201":
          description: CREATED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant" # should be dto?
            "text/csv":
              schema:
                type: string
              example: |
                merchant_id,merchant_city,merchant_state
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
  /merchants/{id}:
    get:
      description: Gets the merchant from the path variable.
      tags:
        - merchant-controller
      operationId: getMerchant
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format:
          description: ID of the merchant.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
              example: |
                merchant_id,merchant_city,merchant_state
        "400":
          description: Bad request - required field missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "id is a required field"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "404":
          description: Not Found - resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "Merchant not found with id = (id)"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
    put:
      description: Updates a merchant.
      tags:
        - merchant-controller
      operationId: putMerchant
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: ID of the merchant.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Merchant" # should be MerchantPostDto (rename to "MerchantSaveDto"?)
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant" # should be MerchantDto
            "text/csv":
              schema:
                type: string
              example: |
                merchant_id,merchant_city,merchant_state
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not Found - resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "The resource with id: (id) was not found"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
    delete:
      description: Deletes a merchant.
      tags:
        - merchant-controller
      operationId: deleteMerchant
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: ID of merchant to delete.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      responses:
        "204":
          description: DELETED
        "400":
          description: Bad request - required field missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "id is a required field"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "404":
          description: Not Found - resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "Merchant not found with id (id)"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "409":
          description: Conflict – merchant cannot be deleted due to existing references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
  /transactions:
    get:
      description: Finds transactions that match the filter.
      tags:
        - transaction-controller
      operationId: findFiltered
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: clientId to filter for.
        - name: year
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: year for date filter, along with month.
        - name: month
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: month for date filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 100
          description: limit for return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: offset for paging.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionDto"
            text/csv:
              schema:
                type: string
              example: |
                id,clientId,merchantId,date,amount
        "204":
          description: No Content - nothing found in the database
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "Invalid month"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
    post:
      description: Creates a new transaction.
      tags:
        - transaction-controller
      operationId: create
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionWriteDto"
        description: Transaction (post dto) to create
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDto"
            description: Saved transaction
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
    delete:
      description: Deletes transactions that match the filter.
      tags:
        - transaction-controller
      operationId: deleteFiltered
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
          description: Content return type header.
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: clientId to filter for.
        - name: year
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: year for date to filter, along with month.
        - name: month
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: month to filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 100
          description: limit to the number of returns.
        - name: acceptParam
          in: query
          required: false
          schema:
            type: string
          description: Content return type parameter.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionDto"
            text/csv:
              schema:
                type: string
              example: |
                id,clientId,merchantId,date,amount
        "204":
          description: No Content - nothing found in the database
        "400":
          description: Bad request - required field missing
          content:
            "application/json":
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path
        "500":
          description: Internal Server Error - unexpected database or server error
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 500
                message: "Unexpected server error"
            text/csv:
              schema:
                type: string
              example: |
                timestamp,status,error,message,path

