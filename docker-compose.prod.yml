services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/tiq/backend:latest
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - CSVPATH=/data
    volumes:
      - ./${TRANSACTIONS_DATA_PATH}:/data
 
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/tiq/frontend:latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
 
  db:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
 
volumes:
  db-data:
 